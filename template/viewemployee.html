{% extends 'base.html' %}
{% block content %}
<div class="container mt-4 mx-auto text-center w-50 border border-2 p-4">
<h3 class="text-center" >View Books</h3>
    <table class="table table-bordered">
       <tr>
           <th>Employee ID</th>
           <th>Employee Name</th>
           <th>Email</th>
           <th>Phone</th>
           <th>designation</th>
           <th>salary</th>
           <th>Image</th>
       </tr>
        {% for i in employee %}
        <tr>
            <td>{{i.employee_id}}</td>
            <td>{{i.employee_name}}</td>
            <td>{{i.email}}</td>
            <td>{{i.phone_number}}</td>
            <td>{{i.designation}}</td>
            <td>{{i.salary}}</td>
            <td><img src="{{i.image.url}}" height="100px" width="100px"></td>
        {% endfor %}

        </tr>
    </table>
    </div>
{% endblock %}
